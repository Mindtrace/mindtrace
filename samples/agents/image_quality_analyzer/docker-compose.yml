services:
  ollama1:
    image: ollama/ollama:latest
    container_name: ollama1
    ports:
      - "11436:11434"
    volumes:
      - ollama1_data:/root/.ollama
    restart: unless-stopped
    # Remove the deploy section if you don't have an NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama2:
    image: ollama/ollama:latest
    container_name: ollama2
    ports:
      - "11435:11434"
    volumes:
      - ollama2_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama1_data:
  ollama2_data:

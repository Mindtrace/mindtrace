# Example Datalake comparison config that compares local integration Mongo with
# MongoDB Atlas.
#
# Prefer configuring Atlas through standard Mindtrace config/env:
#   MINDTRACE_DATALAKE__REMOTE_MONGO_DB_URI=mongodb+srv://<user>:<password>@<cluster>.mongodb.net/?appName=<app>
#   MINDTRACE_DATALAKE__REMOTE_MONGO_DB_NAME=mindtrace_stress_atlas
#
# If needed, uncomment the resources block below to override those values for
# this run only. Keep real credentials out of source control.

# resources:
#   REMOTE_MONGO_DB_URI: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/?retryWrites=true&w=majority&appName=<app>
#   REMOTE_MONGO_DB_NAME: mindtrace_stress_atlas

suites:
  datalake.payload-write-ceiling:
    sweep:
      backend: [local, minio, gcs]
      payload_size: [1KiB, 1MiB, 10MiB]
      concurrency: [1]

  datalake.mongo-insert-ceiling:
    sweep:
      mongo_backend: [local, atlas]
      batch_size: [100]

  datalake.create-asset-from-object:
    sweep:
      backend: [local, minio, gcs]
      mongo_backend: [local, atlas]
      payload_size: [1KiB, 1MiB, 10MiB]
      concurrency: [1]

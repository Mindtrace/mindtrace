profiles:
  smoke:
    duration: 10s
    warmup: 0s
    cooldown: 0s
  standard:
    duration: 60s
    warmup: 5s
    cooldown: 0s

suites:
  registry.write-ceiling:
    label: Registry / write ceiling
    module: tests.stress.suites.registry.local_write_ceiling
    tags: [registry, write]
    requires: [local_disk]
    default_selected: true
    safety: Uses generated object prefixes. Local backend uses temporary disk; MinIO/GCS backends require configured resources.
    parameters:
      backend:
        default: local
        choices: [local, minio, gcs]
      payload_size:
        default: 64KiB
        aliases: [object_size]
      concurrency:
        default: 1
    profiles:
      smoke:
        backend: local
        payload_size: 64KiB
        concurrency: 1
      standard:
        backend: local
        payload_size: 1MiB
        concurrency: 4

  datalake.payload-write-ceiling:
    label: Datalake / payload write ceiling
    module: tests.stress.suites.datalake.registry_write_ceiling
    tags: [datalake, registry, write]
    requires: [local_disk]
    default_selected: true
    safety: Uses Datalake object storage only; does not insert asset metadata. Local backend uses temporary disk; MinIO/GCS backends require configured resources.
    parameters:
      backend:
        default: local
        choices: [local, minio, gcs]
      payload_size:
        default: 64KiB
        aliases: [object_size]
      concurrency:
        default: 1
    profiles:
      smoke:
        backend: local
        payload_size: 64KiB
        concurrency: 1
      standard:
        backend: local
        payload_size: 1MiB
        concurrency: 4

  datalake.mongo-insert-ceiling:
    label: Datalake / Mongo metadata insert ceiling
    module: tests.stress.suites.datalake.mongo_insert_ceiling
    tags: [datalake, mongo, metadata, write]
    requires: [mongo]
    default_selected: false
    safety: Requires explicit Mongo configuration and writes generated Asset/AssetAlias-style metadata.
    parameters:
      batch_size:
        default: 100
    profiles:
      smoke:
        batch_size: 100
      standard:
        batch_size: 1000

  datalake.create-asset-from-object:
    label: Datalake / create_asset_from_object throughput
    module: tests.stress.suites.datalake.create_asset_from_object
    tags: [datalake, registry, mongo, write, e2e]
    requires: [mongo, local_disk]
    default_selected: false
    safety: Requires Datalake resource configuration and exercises the composed payload + metadata write path. Local backend uses temporary disk; MinIO/GCS backends require configured resources.
    parameters:
      backend:
        default: local
        choices: [local, minio, gcs]
      payload_size:
        default: 64KiB
        aliases: [object_size]
      concurrency:
        default: 1
    profiles:
      smoke:
        backend: local
        payload_size: 64KiB
        concurrency: 1
      standard:
        backend: local
        payload_size: 1MiB
        concurrency: 4
